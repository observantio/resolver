openapi: 3.1.0
info:
  title: Resolver Analysis Engine
  description: AI-powered root cause analysis and anomaly detection over logs, metrics,
    and traces.
  version: 1.0.0
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
                type: object
                title: Response Health Api V1 Health Get
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/analyze:
    post:
      tags:
      - RCA
      summary: Full cross-signal RCA
      operationId: analyze_api_v1_analyze_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisReport'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/analyze/config-template:
    get:
      tags:
      - RCA
      summary: Default RCA YAML config template
      operationId: analyze_config_template_api_v1_analyze_config_template_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeConfigTemplateResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v1/anomalies/metrics:
    post:
      tags:
      - Metrics
      summary: Metric Anomalies
      operationId: metric_anomalies_api_v1_anomalies_metrics_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/MetricAnomaly'
                type: array
                title: Response Metric Anomalies Api V1 Anomalies Metrics Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/changepoints:
    post:
      tags:
      - Metrics
      summary: Metric Changepoints
      operationId: metric_changepoints_api_v1_changepoints_post
