          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentEventRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Register Deployment Api V1 Events Deployment Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/events/deployments:
    get:
      tags:
      - Events
      summary: List registered deployment events for a tenant
      operationId: list_deployments_api_v1_events_deployments_get
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/JSONValue'
                title: Response List Deployments Api V1 Events Deployments Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    delete:
      tags:
      - Events
      summary: Clear all deployment events for a tenant
      operationId: clear_deployments_api_v1_events_deployments_delete
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Clear Deployments Api V1 Events Deployments Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/forecast/trajectory:
    post:
      tags:
      - Forecast
      summary: Time-to-failure and degradation trajectory per metric
      operationId: metric_trajectory_api_v1_forecast_trajectory_post
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 100
          title: Limit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrelateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
                title: Response Metric Trajectory Api V1 Forecast Trajectory Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/causal/granger:
    post:
      tags:
      - Causal
      summary: Granger causality between metrics (bounded by default)
      operationId: granger_causality_api_v1_causal_granger_post
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          minimum: 1
          default: 100
          title: Limit
      - name: min_strength
        in: query
        required: false
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          default: 0.05
          title: Min Strength
      - name: max_series
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 2
          default: 25
          title: Max Series
      - name: include_raw
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Raw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrelateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
                title: Response Granger Causality Api V1 Causal Granger Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/causal/bayesian:
    post:
      tags:
      - Causal
      summary: Bayesian posterior over RCA categories given observed signals
      operationId: bayesian_rca_api_v1_causal_bayesian_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
                type: object
                title: Response Bayesian Rca Api V1 Causal Bayesian Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/ml/weights/feedback:
    post:
      tags:
      - ML
      summary: Submit signal correctness feedback
      operationId: signal_feedback_api_v1_ml_weights_feedback_post
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
          title: Tenant Id
      - name: signal
        in: query
        required: true
        schema:
          type: string
          title: Signal
      - name: was_correct
        in: query
        required: true
        schema:
          type: boolean
          title: Was Correct
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
