  /api/v1/reports/{report_id}:
    get:
      tags:
      - RCA Jobs
      summary: Get Report
      operationId: get_report_api_v1_reports__report_id__get
      parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          title: Report Id
      responses:
        '200':
          description: Successful Response
