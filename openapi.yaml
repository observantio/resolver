      tags:
      - Events
      summary: Register a deployment event for RCA correlation
      operationId: register_deployment_api_v1_events_deployment_post
      parameters:
      - name: tenant_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
