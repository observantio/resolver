        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '400':
          description: Bad Request
  /api/v1/correlate:
    post:
      tags:
      - Correlation
      summary: Cross-signal temporal correlation without full RCA
      operationId: correlate_signals_api_v1_correlate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrelateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/JSONValue'
                type: object
                title: Response Correlate Signals Api V1 Correlate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
