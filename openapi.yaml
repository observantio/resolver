      summary: Get Job Result
      operationId: get_job_result_api_v1_jobs__job_id__result_get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
