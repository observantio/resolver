  /api/v1/ready:
    get:
      tags:
      - health
      summary: Backend readiness probe
      operationId: ready_api_v1_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    AnalysisQuality: {}
    AnalysisReport: {}
    AnalyzeConfigTemplateResponse:
      properties:
        version:
          type: integer
          title: Version
        defaults:
          additionalProperties:
            $ref: '#/components/schemas/JSONValue'
          type: object
          title: Defaults
        template_yaml:
          type: string
          title: Template Yaml
        file_name:
          type: string
          title: File Name
      type: object
      required:
      - version
      - defaults
      - template_yaml
      - file_name
      title: AnalyzeConfigTemplateResponse
    AnalyzeJobCreateRequest:
      properties:
        tenant_id:
          type: string
          title: Tenant Id
        start:
          type: integer
          title: Start
        end:
          type: integer
          title: End
        step:
          type: string
          title: Step
          default: 15s
        services:
          items:
            type: string
          type: array
          title: Services
        log_query:
          anyOf:
          - type: string
          - type: 'null'
          title: Log Query
        metric_queries:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Metric Queries
        config_yaml:
          anyOf:
          - type: string
          - type: 'null'
          title: Config Yaml
        sensitivity:
          anyOf:
          - type: number
            maximum: 6.0
            minimum: 1.0
          - type: 'null'
          title: Sensitivity
          default: 3.0
        apdex_threshold_ms:
          type: number
          title: Apdex Threshold Ms
          default: 500.0
        slo_target:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Slo Target
          default: 0.999
        correlation_window_seconds:
          type: number
          maximum: 600.0
          minimum: 10.0
          title: Correlation Window Seconds
          default: 60.0
        forecast_horizon_seconds:
          type: number
          maximum: 86400.0
          minimum: 60.0
          title: Forecast Horizon Seconds
          default: 1800.0
      type: object
      required:
      - tenant_id
      - start
      - end
      title: AnalyzeJobCreateRequest
    AnalyzeJobCreateResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        report_id:
          type: string
          title: Report Id
        status:
          $ref: '#/components/schemas/JobStatus'
